# ===================================================================
# CONFIGURACIÓN DE SQL SERVER EN LA NUBE (SMARTERASP)
# ===================================================================
spring.datasource.url=jdbc:sqlserver://sql1001.site4now.net;databaseName=db_aca73c_contable;encrypt=true;trustServerCertificate=true;
spring.datasource.username=db_aca73c_contable_admin
spring.datasource.password=admin123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Habilitado 'update' para que sincronice la tabla de Java con SQL Server en la nube
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServer2012Dialect

# Optimización para conexiones remotas a SmarterASP
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5

# ===================================================================
# CONFIGURACIÓN DE RED Y SERVIDOR (PUERTO DINÁMICO PARA RENDER)
# ===================================================================
server.port=${PORT:10000}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.main.allow-bean-definition-overriding=true