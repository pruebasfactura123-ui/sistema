#spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=ContabilidadDB;encrypt=false;trustServerCertificate=true;
#spring.datasource.username=sa
#spring.datasource.password=admin123

# ==========================================
# CONFIGURACIÓN DE JPA / HIBERNATE
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# CONFIGURACIÓN DE CARGA DE ARCHIVOS (XML)
# ==========================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==========================================
# PUERTO DEL SERVIDOR
# ==========================================
server.port=8081

# ==========================================
# CONFIGURACIÓN ADICIONAL PARA FECHAS (BUG FIX)
# ==========================================
spring.jackson.deserialization.adjust-dates-to-context-time-zone=false