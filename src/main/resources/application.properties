# ==========================================
# CONFIGURACIÓN DE EMERGENCIA TOTAL (SIN COMPONENTES)
# ==========================================

# 1. Apagar por completo el escaneo de bases de datos y JPA
spring.data.jpa.repositories.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
                             org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
                             org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration,\
                             org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration

# 2. TRUCO DE ORO: Indicarle a Spring que NO registre ningún controlador ni servicio conflictivo
spring.context.annotation.exclude-filter.type=regex
spring.context.annotation.exclude-filter.pattern=com\\.example\\.sistema\\.(controller|service|repository|config)\\..*

# 3. Forzar arranque flexible
spring.main.allow-bean-definition-overriding=true

# 4. Configuración del servidor de Render
server.port=10000
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB