<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registrar Empresa | Oficina Martin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --navy: #111c44; --bg: #f4f7fe; --accent: #007bff; }
        body { background-color: var(--bg); font-family: 'DM Sans', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .register-card { background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05); border: none; width: 100%; max-width: 480px; padding: 35px 30px; }
        .brand-header { text-align: center; margin-bottom: 25px; }
        .brand-header .icon-box { width: 55px; height: 55px; background: var(--navy); color: white; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; margin: 0 auto 12px auto; box-shadow: 0 4px 15px rgba(17, 28, 68, 0.2); }
        .brand-header h4 { color: var(--navy); font-weight: 800; margin: 0; font-size: 1.25rem; }
        .brand-header p { color: #a3aed0; font-size: 0.8rem; margin-top: 5px; }
        .form-control { border-radius: 12px; padding: 10px 15px; font-size: 0.85rem; border: 1px solid #e0e5f2; }
        .form-control:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.15); }
        .section-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); font-weight: 800; margin-bottom: 12px; border-bottom: 1px dashed #e0e5f2; padding-bottom: 5px; }
        .btn-navy { background: var(--navy); color: white; border-radius: 12px; padding: 11px; font-weight: 600; font-size: 0.85rem; width: 100%; border: none; transition: 0.3s; }
        .btn-navy:hover { background: #1a2a61; transform: translateY(-1px); }
    </style>
</head>
<body>

    <div class="register-card">
        <div class="brand-header">
            <div class="icon-box"><i class="fas fa-building"></i></div>
            <h4>Alta de Nueva Empresa</h4>
            <p>Configura tu organización y cuenta maestra de acceso</p>
        </div>

        <div th:if="${param.error}" class="alert alert-danger border-0 d-flex align-items-center mb-3" style="border-radius: 12px; font-size: 0.8rem; padding: 12px;">
            <i class="fas fa-exclamation-circle me-2 fs-5"></i>
            <div>
                <strong>¡Ups! Algo salió mal.</strong> Revisa que el RFC o el Usuario no estén repetidos en la base de datos.
            </div>
        </div>

        <form th:action="@{/registrar-empresa}" method="post">
            <div class="section-title">Datos de la Empresa</div>
            <div class="row mb-3">
                <div class="col-md-5">
                    <label class="form-label text-secondary fw-bold" style="font-size: 0.7rem;">RFC</label>
                    <input type="text" name="rfc" class="form-control" placeholder="XAXX010101000" required>
                </div>
                <div class="col-md-7">
                    <label class="form-label text-secondary fw-bold" style="font-size: 0.7rem;">Razón Social</label>
                    <input type="text" name="razonSocial" class="form-control" placeholder="Mi Empresa S.A." required>
                </div>
            </div>

            <div class="section-title mt-2">Cuenta del Dueño / Jefe</div>
            <div class="mb-3">
                <label class="form-label text-secondary fw-bold" style="font-size: 0.7rem;">Usuario del Sistema</label>
                <input type="text" name="username" class="form-control" placeholder="nombre_usuario" required>
            </div>
            <div class="mb-4">
                <label class="form-label text-secondary fw-bold" style="font-size: 0.7rem;">Contraseña de Acceso</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-navy mb-3">
                <i class="fas fa-check-circle me-2"></i> Dar de Alta y Guardar
            </button>
        </form>

        <div class="text-center mt-2">
            <a href="/login" class="text-decoration-none fw-bold" style="font-size: 0.75rem; color: #a3aed0;">
                <i class="fas fa-arrow-left me-1"></i> Regresar al Inicio de Sesión
            </a>
        </div>
    </div>

</body>
</html>
