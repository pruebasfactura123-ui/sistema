<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Mi Perfil | Sistema Administrativo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --navy: #111c44; --bg: #f4f7fe; --accent: #007bff; }
        body { background: var(--bg); font-family: 'DM Sans', sans-serif; display: flex; min-height: 100vh; margin: 0; font-size: 0.75rem; }
        .sidebar { width: 200px; background: var(--navy); color: white; padding: 20px; position: fixed; height: 100vh; display: flex; flex-direction: column; }
        .sidebar h4 { font-size: 0.9rem; font-weight: 800; margin-bottom: 25px; color: white; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; text-transform: uppercase; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .nav-link { color: #a3aed0; padding: 10px; border-radius: 12px; margin-bottom: 5px; display: flex; align-items: center; gap: 10px; text-decoration: none; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.1); color: white; }
        .main-content { margin-left: 200px; width: calc(100% - 200px); padding: 20px; }
        .card-custom { background: white; border-radius: 15px; padding: 25px; border: none; box-shadow: 0 4px 20px rgba(0,0,0,0.03); max-width: 500px; }
        .badge-rol { background: #e0e7ff; color: #4338ca; padding: 4px 10px; border-radius: 6px; font-weight: bold; font-size: 0.7rem; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h4 th:text="${empresaNombre ?: 'OFICINA FISCAL'}">EMPRESA</h4>
        <nav class="nav flex-column flex-grow-1">
            <a href="/" class="nav-link"><i class="fas fa-chart-pie"></i> Inicio </a>
            
            <div sec:authorize="hasAnyAuthority('JEFE', 'GERENTE') or hasAnyRole('JEFE', 'GERENTE')" class="mt-3">
                <p class="text-uppercase fw-bold mb-2" style="font-size: 0.55rem; color: #4e5d78; letter-spacing: 1px; padding-left: 10px;">Administración</p>
                <a href="/usuarios" class="nav-link"><i class="fas fa-users"></i> Trabajadores</a>
                <a sec:authorize="hasAnyAuthority('JEFE') or hasAnyRole('JEFE')" href="/empresa" class="nav-link"><i class="fas fa-building"></i> Mi Empresa</a>
            </div>
        </nav>

        <div class="mt-auto border-top pt-3 border-secondary">
            <a href="/perfil" class="nav-link active mb-2"><i class="fas fa-user-circle"></i> Mi Perfil</a>
            <div class="d-flex align-items-center gap-2 mb-2">
                <div class="bg-primary rounded-circle" style="width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem;">
                    <i class="fas fa-user text-white"></i>
                </div>
                <div style="line-height: 1.1;">
                    <div class="fw-bold text-white" style="font-size: 0.7rem;" sec:authentication="name">Usuario</div>
                    <div class="text-muted" style="font-size: 0.55rem;">CONECTADO</div>
                </div>
            </div>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-link text-danger text-decoration-none p-0 w-100 text-start" style="font-size: 0.7rem;">
                    <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                </button>
            </form>
        </div>
    </aside>

    <main class="main-content d-flex align-items-center justify-content-center" style="min-height: 100vh;">
        <div class="card-custom w-100">
            <div class="text-center mb-4">
                <div class="bg-primary text-white rounded-circle mx-auto mb-2 d-flex align-items-center justify-content-center" style="width: 60px; height: 60px; font-size: 1.5rem;">
                    <i class="fas fa-user"></i>
                </div>
                <h4 class="fw-bold m-0 text-navy" th:text="${usuario.username}">NombreUsuario</h4>
                <p class="text-muted mt-1 mb-2">Datos de la credencial activa</p>
                <span class="badge-rol" th:text="${usuario.rol}">ROL</span>
            </div>

            <div th:if="${param.exito}" class="alert alert-success py-2 text-center" style="font-size: 0.65rem;">
                ¡Contraseña actualizada correctamente en SQL Server!
            </div>
            <div th:if="${param.error}" class="alert alert-danger py-2 text-center" style="font-size: 0.65rem;">
                Hubo un error al intentar cambiar la contraseña.
            </div>

            <hr class="text-muted">

            <form th:action="@{/perfil/actualizar-clave}" method="post" onsubmit="return confirm('¿Seguro de cambiar tu contraseña? Se aplicará en el próximo inicio de sesión.');">
                <div class="mb-3">
                    <label class="form-label text-muted fw-bold" style="font-size: 0.6rem; text-transform: uppercase;">ID de Empleado</label>
                    <input type="text" class="form-control form-control-sm bg-light" th:value="${usuario.id}" readonly>
                </div>
                <div class="mb-3">
                    <label class="form-label text-muted fw-bold" style="font-size: 0.6rem; text-transform: uppercase;">Nombre de Usuario</label>
                    <input type="text" class="form-control form-control-sm bg-light" th:value="${usuario.username}" readonly>
                </div>
                <div class="mb-4">
                    <label class="form-label text-navy fw-bold" style="font-size: 0.65rem;">Actualizar Contraseña</label>
                    <input type="password" name="nuevaClave" class="form-control form-control-sm" placeholder="Escribe tu nueva clave aquí" required>
                </div>
                <div class="d-flex gap-2">
                    <a href="/" class="btn btn-sm btn-light w-50 rounded-pill fw-bold" style="text-decoration: none; display: flex; align-items: center; justify-content: center;">Volver</a>
                    <button type="submit" class="btn btn-sm btn-primary w-50 rounded-pill fw-bold">Guardar Cambios</button>
                </div>
            </form>
        </div>
    </main>

</body>
</html>
