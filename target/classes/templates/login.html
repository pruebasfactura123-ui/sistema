<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión | Oficina Martin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --navy: #111c44;
            --bg: #f4f7fe;
            --accent: #007bff;
        }
        body {
            background-color: var(--bg);
            font-family: 'DM Sans', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border: none;
            width: 100%;
            max-width: 420px;
            padding: 40px 30px;
        }
        .brand-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .brand-header .icon-box {
            width: 60px;
            height: 60px;
            background: var(--navy);
            color: white;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin: 0 auto 15px auto;
            box-shadow: 0 4px 15px rgba(17, 28, 68, 0.2);
        }
        .brand-header h4 {
            color: var(--navy);
            font-weight: 800;
            margin: 0;
            font-size: 1.3rem;
            letter-spacing: 0.5px;
        }
        .brand-header p {
            color: #a3aed0;
            font-size: 0.8rem;
            margin-top: 5px;
        }
        .form-control {
            border-radius: 12px;
            padding: 12px 15px;
            font-size: 0.85rem;
            border: 1px solid #e0e5f2;
            background-color: #fff;
        }
        .form-control:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.15);
        }
        .input-group-text {
            background: transparent;
            border-color: #e0e5f2;
            color: #a3aed0;
            border-radius: 12px 0 0 12px;
        }
        .form-control-with-icon {
            border-radius: 0 12px 12px 0;
        }
        .btn-navy {
            background: var(--navy);
            color: white;
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            font-size: 0.85rem;
            width: 100%;
            border: none;
            transition: 0.3s;
        }
        .btn-navy:hover {
            background: #1a2a61;
            color: white;
            transform: translateY(-1px);
        }
        .alert-custom {
            border-radius: 12px;
            font-size: 0.8rem;
            padding: 10px 15px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand-header">
            <div class="icon-box">
                <i class="fas fa-building-columns"></i>
            </div>
            <h4>SISTEMA ADMINISTRATIVO</h4>
            <p>Ingresa tu usuario o registra tu empresa para comenzar</p>
        </div>

        <div th:if="${param.error}" class="alert alert-danger alert-custom mb-3" role="alert">
            <i class="fas fa-exclamation-circle me-2"></i> Usuario o contraseña incorrectos.
        </div>
        
        <div th:if="${param.logout}" class="alert alert-success alert-custom mb-3" role="alert">
            <i class="fas fa-check-circle me-2"></i> Sesión cerrada correctamente.
        </div>

        <div th:if="${param.empresaCreada}" class="alert alert-success alert-custom mb-3" role="alert">
            <i class="fas fa-building me-2"></i> Empresa y cuenta de Jefe registradas. ¡Ya puedes iniciar sesión!
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label fw-bold text-secondary" style="font-size: 0.75rem;">Usuario</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" name="username" class="form-control form-control-with-icon" placeholder="nombre_usuario" required autofocus>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold text-secondary" style="font-size: 0.75rem;">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" name="password" class="form-control form-control-with-icon" placeholder="Contraseña" required>
                </div>
            </div>

            <button type="submit" class="btn btn-navy mb-3">
                <i class="fas fa-sign-in-alt me-2"></i> Iniciar Sesión
            </button>
        </form>

        <div class="text-center border-top pt-3 mt-2">
            <a href="/registrar-empresa" class="text-decoration-none fw-bold" style="font-size: 0.8rem; color: var(--accent);">
                <i class="fas fa-plus-circle me-1"></i> ¿Eres nuevo? Registra tu Empresa aquí
            </a>
        </div>

        <div class="text-center mt-4">
            <small class="text-muted" style="font-size: 0.65rem;">
                &copy; 2026 Oficina. Todos los derechos reservados.
            </small>
        </div>
    </div>

</body>
</html>
